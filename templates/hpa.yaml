apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: expense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpuUtilization }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 20   # wait 60s before scaling down
      policies:
        - type: Pods
          value: 1                     # remove 1 pod at a time
          periodSeconds: 60            # every 60 seconds
    scaleUp:
      stabilizationWindowSeconds: 0    # scale up immediately
      policies:
        - type: Pods
          value: 2                     # add 2 pods at a time
          periodSeconds: 30            # every 30 seconds